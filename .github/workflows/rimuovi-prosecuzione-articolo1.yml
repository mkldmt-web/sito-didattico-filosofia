name: Rimuovi prosecuzione articolo 1

on:
  push:
    paths:
      - '.github/workflows/rimuovi-prosecuzione-articolo1.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rimuovi blocco di prosecuzione
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('quando-l-arte-era-una-soglia.html')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'\n\s*<h3>Verso il modulo successivo</h3>\s*\n'
              r'\s*<p>Il prossimo modulo seguirà queste tracce dentro le prime grandi civiltà storiche:.*?</p>\s*\n'
              r'\s*<p>Entreranno in scena miti, dèi, templi, scritture sacre, regalità rituali, cosmologie, inni, immagini divine, racconti di creazione, vie dell’anima e forme antiche della sapienza\.</p>\s*\n'
              r'\s*<p>La domanda resterà la stessa, ma assumerà nuove forme:</p>\s*\n'
              r'\s*<p><strong>come l’essere umano ha cercato di dare figura, parola, corpo e spazio all’assoluto\?</strong></p>\s*\n'
          )
          new_text, count = pattern.subn('\n', text, count=1)
          if count != 1:
              raise SystemExit(f'Blocco non trovato o non rimosso: count={count}')
          path.write_text(new_text, encoding='utf-8')

          wf = Path('.github/workflows/rimuovi-prosecuzione-articolo1.yml')
          wf.unlink(missing_ok=True)
          PY

      - name: Commit modifiche
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quando-l-arte-era-una-soglia.html .github/workflows/rimuovi-prosecuzione-articolo1.yml
          git commit -m "Rimuovi rimando finale dall'articolo Corpi, grotte, presenze"
          git push
