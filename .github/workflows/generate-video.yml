name: Genera video articolo

on:
  workflow_dispatch:
    inputs:
      video_part:
        description: "Parte da generare: 1, 2 oppure all"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "all"
      tts_voice:
        description: "Voce TTS da usare"
        required: false
        default: "alloy"
      tts_speed:
        description: "Velocità voce"
        required: false
        default: "0.95"

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r video-tools/requirements.txt

      - name: Configure TTS environment
        run: |
          cat > video-tools/.env <<EOF
          TTS_API_URL=https://api.openai.com/v1/audio/speech
          TTS_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TTS_MODEL=gpt-4o-mini-tts
          TTS_VOICE=${{ github.event.inputs.tts_voice }}
          TTS_SPEED=${{ github.event.inputs.tts_speed }}
          TTS_OUTPUT_FORMAT=mp3
          TTS_MAX_ATTEMPTS=10
          TTS_RETRY_BASE_SECONDS=40
          TTS_PAUSE_SECONDS=18
          VIDEO_RESOLUTION=1280x720
          VIDEO_FPS=24
          VIDEO_CRF=28
          VIDEO_PRESET=medium
          EOF

      - name: Check secret is available
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "Missing OPENAI_API_KEY secret. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate selected video part
        run: |
          python video-tools/generate_video.py --part "${{ github.event.inputs.video_part }}" --max-chars 1500

      - name: Show generated files
        run: |
          ls -lh assets/video || true
          du -h assets/video/*.mp4 || true

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-quando-l-arte-era-una-soglia-parte-${{ github.event.inputs.video_part }}
          path: |
            assets/video/*.mp4
            assets/video/*.vtt

      - name: Commit generated video to repository if size is acceptable
        run: |
          MAX_SIZE=$((95 * 1024 * 1024))
          TOO_LARGE=0

          for VIDEO in assets/video/*.mp4; do
            [ -e "$VIDEO" ] || continue
            ACTUAL_SIZE=$(stat -c%s "$VIDEO")
            if [ "$ACTUAL_SIZE" -gt "$MAX_SIZE" ]; then
              echo "Video too large for normal GitHub commit: $VIDEO ($ACTUAL_SIZE bytes). Artifact uploaded instead."
              TOO_LARGE=1
            fi
          done

          if [ "$TOO_LARGE" -eq 1 ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/video/*.mp4 assets/video/*.vtt
          git commit -m "Add generated audiovisual video part ${{ github.event.inputs.video_part }}" || echo "No changes to commit"
          git push
