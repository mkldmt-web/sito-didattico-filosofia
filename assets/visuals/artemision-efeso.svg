<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Artemision di Efeso</title>
<desc id="desc">Scheda visiva schematica dell'Artemision di Efeso con tempio, statua cultuale, città e processione.</desc>
<rect width="1200" height="760" fill="#fff8ed"/>
<text x="600" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="46" fill="#3b2d26" font-weight="700">Artemision di Efeso</text>
<rect x="260" y="170" width="680" height="360" rx="18" fill="#f2e3d0" stroke="#8b4a2b" stroke-width="5"/>
<rect x="330" y="230" width="540" height="240" rx="12" fill="#fff8ed" stroke="#d3b58e" stroke-width="4"/>
<g fill="#d8bd95" stroke="#8b4a2b" stroke-width="3">
<rect x="350" y="200" width="28" height="300"/><rect x="410" y="200" width="28" height="300"/><rect x="470" y="200" width="28" height="300"/><rect x="530" y="200" width="28" height="300"/><rect x="590" y="200" width="28" height="300"/><rect x="650" y="200" width="28" height="300"/><rect x="710" y="200" width="28" height="300"/><rect x="770" y="200" width="28" height="300"/><rect x="830" y="200" width="28" height="300"/>
</g>
<g transform="translate(560 280)">
<circle cx="40" cy="35" r="24" fill="#6f2f1b"/>
<rect x="15" y="62" width="50" height="100" rx="16" fill="#6f2f1b" opacity=".85"/>
<path d="M0 95 L80 95" stroke="#6f2f1b" stroke-width="8" stroke-linecap="round"/>
</g>
<path d="M135 590 C315 560 460 560 600 590 C760 625 920 620 1060 575" fill="none" stroke="#8b4a2b" stroke-width="7" stroke-linecap="round" stroke-dasharray="1 18"/>
<circle cx="600" cy="590" r="15" fill="#6f2f1b"/>
<g font-family="Arial,sans-serif" font-size="23" fill="#5b4a3f">
<text x="600" y="560" text-anchor="middle">processione / via sacra</text>
<text x="600" y="665" text-anchor="middle">Il tempio non è solo edificio: statua, percorso, offerte, città e memoria rituale.</text>
</g>
<g font-family="Georgia,serif" font-size="30" fill="#3b2d26" font-weight="700">
<text x="600" y="155" text-anchor="middle">santuario</text>
<text x="600" y="485" text-anchor="middle">immagine cultuale</text>
