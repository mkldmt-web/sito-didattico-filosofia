<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Tetraktys e monocordo</title>
<desc id="desc">Schema della tetraktys pitagorica e del monocordo con rapporti musicali 1 a 2, 2 a 3, 3 a 4.</desc>
<rect width="1200" height="760" fill="#fff8ed"/>
<g transform="translate(170 105)">
<text x="230" y="0" text-anchor="middle" font-family="Georgia,serif" font-size="42" fill="#3b2d26" font-weight="700">Tetraktys</text>
<g fill="#6f2f1b">
<circle cx="230" cy="80" r="18"/>
<circle cx="190" cy="145" r="18"/><circle cx="270" cy="145" r="18"/>
<circle cx="150" cy="210" r="18"/><circle cx="230" cy="210" r="18"/><circle cx="310" cy="210" r="18"/>
<circle cx="110" cy="275" r="18"/><circle cx="190" cy="275" r="18"/><circle cx="270" cy="275" r="18"/><circle cx="350" cy="275" r="18"/>
</g>
<path d="M230 70 L105 295 L355 295 Z" fill="none" stroke="#8b4a2b" stroke-width="3" opacity=".6"/>
<text x="230" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#5b4a3f">1 + 2 + 3 + 4 = 10</text>
<text x="230" y="386" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#5b4a3f">punto, numero, figura, ordine</text>
</g>
<g transform="translate(640 125)">
<text x="235" y="-20" text-anchor="middle" font-family="Georgia,serif" font-size="42" fill="#3b2d26" font-weight="700">Monocordo</text>
<rect x="0" y="115" width="470" height="42" rx="18" fill="#d8bd95"/>
<line x1="22" y1="136" x2="448" y2="136" stroke="#3b2d26" stroke-width="5"/>
<circle cx="22" cy="136" r="10" fill="#6f2f1b"/><circle cx="448" cy="136" r="10" fill="#6f2f1b"/>
<line x1="235" y1="85" x2="235" y2="185" stroke="#8b4a2b" stroke-width="4"/>
<line x1="305" y1="95" x2="305" y2="176" stroke="#8b4a2b" stroke-width="3" opacity=".8"/>
<line x1="342" y1="100" x2="342" y2="170" stroke="#8b4a2b" stroke-width="3" opacity=".65"/>
<g font-family="Arial,sans-serif" font-size="23" fill="#5b4a3f">
<text x="235" y="228" text-anchor="middle">1 : 2 — ottava</text>
<text x="305" y="270" text-anchor="middle">2 : 3 — quinta</text>
<text x="342" y="312" text-anchor="middle">3 : 4 — quarta</text>
</g>
</g>
<text x="600" y="690" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#3b2d26">La musica mostra il numero come forma udibile dell’ordine.</text>
</svg>