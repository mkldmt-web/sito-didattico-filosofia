<path d="M500 332 C595 360 750 374 910 342" fill="none" stroke="#8b4a2b" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 18"/>
<path d="M512 325 C425 500 327 558 255 592" fill="none" stroke="#8b4a2b" stroke-width="8" stroke-linecap="round"/>
<path d="M255 592 C300 615 350 615 405 592" fill="none" stroke="#8b4a2b" stroke-width="8" stroke-linecap="round"/>
<path d="M512 325 C593 448 700 532 820 603" fill="none" stroke="#8b4a2b" stroke-width="4" stroke-linecap="round" stroke-dasharray="14 14" opacity=".7"/>
<circle cx="512" cy="325" r="18" fill="#6f2f1b"/>
<circle cx="255" cy="592" r="18" fill="#6f2f1b"/>
