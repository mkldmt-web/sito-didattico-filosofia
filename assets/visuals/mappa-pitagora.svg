<g font-family="Georgia, serif" fill="#3b2d26">
<text x="512" y="285" text-anchor="middle" font-size="38" font-weight="700">Samo</text>
<text x="255" y="642" text-anchor="middle" font-size="38" font-weight="700">Crotone</text>
<text x="405" y="642" text-anchor="middle" font-size="38" font-weight="700">Metaponto</text>
<text x="910" y="306" text-anchor="middle" font-size="30">Ionia</text>
<text x="820" y="646" text-anchor="middle" font-size="28" opacity=".75">Egitto / Oriente</text>
<text x="600" y="705" text-anchor="middle" font-size="24">Il sapere si muove: isole, porti, comunità, disciplina, numero.</text>
</g>
<g font-family="Arial, sans-serif" fill="#5b4a3f" font-size="22">
<text x="105" y="80">Mappa didattica: non ricostruisce un itinerario certo, ma localizza i poli della tradizione pitagorica.</text>
</g>
</svg>