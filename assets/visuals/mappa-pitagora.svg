<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Mappa del percorso pitagorico</title>
<desc id="desc">Schema del Mediterraneo orientale e centrale con Samo, Crotone e Metaponto, e tracce secondarie verso Egitto e Oriente.</desc>
